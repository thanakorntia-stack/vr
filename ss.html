<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Ninja Reflex - PRO VERSION</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
      #startScreen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        z-index: 999; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        font-family: 'Segoe UI', Tahoma, sans-serif; color: white;
      }
      #playerName {
        padding: 10px 15px; font-size: 20px; border: 2px solid #00FFFF; 
        border-radius: 5px; background: rgba(0,0,0,0.5); color: #00FFFF;
        margin-bottom: 20px; text-align: center; outline: none;
      }
      #startBtn {
        padding: 12px 30px; font-size: 22px; font-weight: bold;
        background-color: #00FFFF; color: #000; border: none;
        border-radius: 5px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 15px #00FFFF;
      }
      #startBtn:hover { transform: scale(1.1); background-color: #fff; }
    </style>
  </head>
  <body>

    <div id="startScreen">
      <h1 style="font-size: 45px; text-shadow: 0 0 20px #00FFFF; margin-bottom: 10px;">NINJA REFLEX VR</h1>
      <p style="font-size: 18px; color: #ccc;">ยิงคริสตัลสีฟ้า (+10) | ระวังหนามสีแดง (-5 วินาที)</p>
      <input type="text" id="playerName" placeholder="Enter your name..." autocomplete="off">
      <button id="startBtn">START MISSION</button>
    </div>

    <a-scene fog="type: exponential; color: #0f2027; density: 0.05">
      <a-entity environment="preset: tron; skyType: color; skyColor: #0f2027; grid: 1x1"></a-entity>

      <a-entity position="0 1.6 0">
        <a-camera look-controls wasd-controls>
          <a-cursor fuse="true" fuse-timeout="500" raycaster="objects: .interactable" color="#FFFFFF"
            animation__fusing="property: scale; startEvents: fusing; dur: 500; from: 1 1 1; to: 0.1 0.1 0.1"
            animation__mouseleave="property: scale; startEvents: mouseleave; dur: 100; to: 1 1 1">
          </a-cursor>

          <a-text id="scoreText" value="SCORE: 0" position="-1.5 0.8 -2" color="#00FFFF" width="4" font="monoid"></a-text>
          <a-text id="comboText" value="" position="-1.5 0.5 -2" color="#FFD700" width="4" font="monoid"></a-text>
          <a-text id="timerText" value="TIME: 45" position="1.5 0.8 -2" color="#00FF00" width="4" font="monoid" align="right"></a-text>
          <a-text id="warningText" value="" position="0 0.5 -1.5" color="#FF0000" width="5" font="monoid" align="center"></a-text>
          <a-text id="gameOverText" value="" position="0 0 -1.5" color="#FFFFFF" width="6" font="monoid" align="center" visible="false"></a-text>
        </a-camera>
      </a-entity>

      <a-octahedron 
        id="target-gem" class="interactable" position="-2 1.6 -4" radius="0.3" color="#00FFFF" visible="false"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
        animation__bob="property: position; dir: alternate; dur: 1000; easing: easeInOutSine; loop: true; to: -2 1.8 -4">
      </a-octahedron>

      <a-icosahedron 
        id="target-bomb" class="interactable" position="2 1.2 -5" radius="0.4" color="#FF0000" visible="false" wireframe="true"
        animation="property: rotation; to: 360 360 360; loop: true; dur: 5000; easing: linear"
        animation__bob="property: position; dir: alternate; dur: 1500; easing: easeInOutSine; loop: true; to: 2 1.5 -5">
      </a-icosahedron>

    </a-scene>

    <script>
      const startScreen = document.querySelector('#startScreen');
      const startBtn = document.querySelector('#startBtn');
      
      const targetGem = document.querySelector('#target-gem');
      const targetBomb = document.querySelector('#target-bomb');
      
      const scoreText = document.querySelector('#scoreText');
      const comboText = document.querySelector('#comboText');
      const timerText = document.querySelector('#timerText');
      const warningText = document.querySelector('#warningText');
      const gameOverText = document.querySelector('#gameOverText');
      
      let score = 0;
      let timeLeft = 45; // ให้เวลา 45 วินาที
      let isGameOver = true; 
      let comboCount = 0;
      let comboTimer = null;
      let countdown; 

      // ฟังก์ชันสุ่มตำแหน่งเป้าหมาย
      function moveTarget(targetEl, baseHeight) {
        const randomX = (Math.random() * 8) - 4; 
        const randomZ = (Math.random() * -3) - 3; 
        targetEl.setAttribute('position', `${randomX} ${baseHeight} ${randomZ}`);
        targetEl.setAttribute('animation__bob', `property: position; dir: alternate; dur: ${Math.random() * 1000 + 800}; easing: easeInOutSine; loop: true; to: ${randomX} ${baseHeight + 0.5} ${randomZ}`);
      }

      startBtn.addEventListener('click', function() {
        startScreen.style.display = 'none';
        isGameOver = false;
        
        targetGem.setAttribute('visible', 'true'); 
        targetBomb.setAttribute('visible', 'true'); 

        countdown = setInterval(function() {
          if (!isGameOver) {
            timeLeft--; 
            timerText.setAttribute('value', 'TIME: ' + timeLeft);
            
            // เปลี่ยนสีเวลาให้เป็นสีแดงถ้าเหลือน้อยกว่า 10 วิ
            if(timeLeft <= 10) timerText.setAttribute('color', '#FF0000');

            if (timeLeft <= 0) {
              isGameOver = true;
              clearInterval(countdown);
              targetGem.setAttribute('visible', 'false'); targetGem.classList.remove('interactable');
              targetBomb.setAttribute('visible', 'false'); targetBomb.classList.remove('interactable');
              
              gameOverText.setAttribute('value', 'MISSION ACCOMPLISHED\n\nFINAL SCORE: ' + score);
              gameOverText.setAttribute('visible', 'true');
              comboText.setAttribute('value', '');
              warningText.setAttribute('value', '');
            }
          }
        }, 1000);
      });

      // --- Logic เวลายิงโดนคริสตัล (ได้คะแนน) ---
      targetGem.addEventListener('click', function () {
        if (isGameOver) return; 

        // ระบบ Combo
        comboCount++;
        let pointsEarned = 10 * comboCount; // ยิ่งคอมโบเยอะ ยิ่งได้แต้มเยอะ
        score += pointsEarned;
        
        scoreText.setAttribute('value', 'SCORE: ' + score);
        
        if(comboCount > 1) {
          comboText.setAttribute('value', 'COMBO x' + comboCount + ' (+' + pointsEarned + ')');
        }

        // รีเซ็ตเวลา Combo (ถ้าไม่ยิงใน 2 วิ คอมโบหลุด)
        clearTimeout(comboTimer);
        comboTimer = setTimeout(() => {
          comboCount = 0;
          comboText.setAttribute('value', '');
        }, 2000);

        moveTarget(targetGem, 1.5);
        
        // สุ่มย้ายระเบิดด้วยเพื่อกวนผู้เล่น
        if(Math.random() > 0.5) moveTarget(targetBomb, 1.2); 
      });

      // --- Logic เวลายิงโดนระเบิด (โดนทำโทษ) ---
      targetBomb.addEventListener('click', function () {
        if (isGameOver) return; 

        comboCount = 0; // คอมโบพังทันที
        comboText.setAttribute('value', '');
        
        timeLeft -= 5; // โดนหัก 5 วินาที
        timerText.setAttribute('value', 'TIME: ' + timeLeft);
        
        warningText.setAttribute('value', 'OUCH! TIME -5s');
        setTimeout(() => { warningText.setAttribute('value', ''); }, 1000);

        moveTarget(targetBomb, 1.2);
        moveTarget(targetGem, 1.5);
      });

      // เอฟเฟกต์ตอนเล็ง (Highlight)
      const interactables = document.querySelectorAll('.interactable');
      interactables.forEach(function(el) {
        el.addEventListener('mouseenter', function () {
          if (!isGameOver) el.setAttribute('opacity', 0.6);
        });
        el.addEventListener('mouseleave', function () {
          if (!isGameOver) el.setAttribute('opacity', 1.0);
        });
      });
    </script>
  </body>
</html>
